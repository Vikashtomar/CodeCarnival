 <!DOCTYPE html>
<html lang="en">
<head>
    <title>Simple Counter</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            margin-top: 100px;
        }
        #counter {
            font-size: 50px;
            margin: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Simple Counter</h1>
    <div id="counter">0</div>

    <button onclick="increase()">Increase</button>
    <button onclick="decrease()">Decrease</button>
    <button onclick="reset()">Reset</button>

    <script>
        let count = 0;


        function increase() {
            count++;
            updateDisplay();
        }

        function decrease() {
            count--;
            updateDisplay();
        }

        function reset() {
            count = 0;
            updateDisplay();
        }

        
        function updateDisplay() {
            document.getElementById("counter").innerText = count;
        }
    </script>

</body>
</html>
